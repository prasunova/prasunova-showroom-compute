name: Cleanup Old User Masks

on:
  schedule:
    - cron: "0 2 * * 0"  # Every Sunday at 2am UTC
  workflow_dispatch:
    inputs:
      retention_days:
        description: "Delete masks older than N days (default: 30)"
        required: false
        default: "30"

jobs:
  cleanup:
    runs-on: ubuntu-latest

    env:
      R2_ENDPOINT:            ${{ secrets.R2_ENDPOINT }}
      R2_ACCESS_KEY_ID:       ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY:   ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME:         ${{ secrets.R2_BUCKET_NAME }}
      RETENTION_DAYS:         ${{ inputs.retention_days || '30' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Python dependencies
        run: pip install boto3

      - name: Delete stale user masks from R2
        run: python scripts/cleanup_user_masks.py
