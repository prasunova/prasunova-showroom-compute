name: User Upload Masks (SAM 3)

on:
  workflow_dispatch:
    inputs:
      image_hash:
        description: "SHA256 first 8 chars of user image"
        required: true
      category:
        description: "Room category"
        required: true
        default: "living_room"
      client_slug:
        description: "Client slug"
        required: true

jobs:
  segment:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      HUGGING_FACE_HUB_TOKEN: ${{ secrets.HF_TOKEN }}
      R2_ENDPOINT:            ${{ secrets.R2_ENDPOINT }}
      R2_ACCESS_KEY_ID:       ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY:   ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME:         ${{ secrets.R2_BUCKET_NAME }}

    steps:
      - uses: actions/checkout@v4

      - name: Restore SAM 3 model cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: sam3-hf-cache-v1
          restore-keys: sam3-hf-cache-

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install transformers accelerate Pillow numpy boto3

      - name: Run SAM 3 on user image
        env:
          IMAGE_HASH:  ${{ inputs.image_hash }}
          CATEGORY:    ${{ inputs.category }}
          CLIENT_SLUG: ${{ inputs.client_slug }}
        run: |
          python scripts/segment_sam3.py \
            --mode user_upload \
            --image-hash "$IMAGE_HASH" \
            --category "$CATEGORY" \
            --client-slug "$CLIENT_SLUG"

      - name: Validate masks
        env:
          IMAGE_HASH:  ${{ inputs.image_hash }}
          CLIENT_SLUG: ${{ inputs.client_slug }}
        run: |
          python scripts/validate_mask.py \
            --client-slug "$CLIENT_SLUG" \
            --image-hash "$IMAGE_HASH"

      - name: Write ready.json to R2
        env:
          IMAGE_HASH:  ${{ inputs.image_hash }}
          CLIENT_SLUG: ${{ inputs.client_slug }}
        run: |
          python scripts/notify_ready.py \
            --hash "$IMAGE_HASH" \
            --client-slug "$CLIENT_SLUG"
